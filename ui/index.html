<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinyLLM Web Interface</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>TinyLLM <span class="highlight">Web</span></h1>
        <p>Running entirely in your browser using ONNX Runtime</p>
      </header>

      <main>
        <div class="chat-container">
          <div id="output" class="output-area">
            <div class="message system">
              Downloading and loading ONNX model... Please wait.
            </div>
          </div>

          <div class="input-area">
            <input
              type="text"
              id="prompt-input"
              placeholder="Enter your prompt... e.g., 오늘 날씨가 아주"
              disabled
            />
            <button id="generate-btn" disabled>Generate</button>
          </div>
        </div>

        <div class="controls">
          <div class="control-group">
            <label for="temp-slider"
              >Temperature: <span id="temp-val">0.8</span></label
            >
            <input
              type="range"
              id="temp-slider"
              min="0.1"
              max="2.0"
              step="0.1"
              value="0.8"
            />
          </div>
          <div class="control-group">
            <label for="tokens-slider"
              >Max Tokens: <span id="tokens-val">32</span></label
            >
            <input
              type="range"
              id="tokens-slider"
              min="1"
              max="64"
              step="1"
              value="32"
            />
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
